<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاميرا تليجرام - نسخة مصححة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            transform: scaleX(-1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .warning { background: #fff3cd; color: #856404; }
        canvas { display: none; }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }
        .chat-id-info {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-size: 12px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 تصوير وإرسال</h1>
        
        <div class="chat-id-info">
            🔧 <strong>للحصول على Chat ID الصحيح:</strong><br>
            1. ابدأ محادثة مع البوت<br>
            2. أرسل أي رسالة<br>
            3. افتح الرابط أدناه وابحث عن "chat":{"id": رقم}
        </div>
        
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <br>
        <button id="captureBtn" disabled>📷 التقط وأرسل</button>
        <div id="status" class="status info">⏳ جاري تهيئة الكاميرا...</div>
    </div>

    <script>
        // ==================== إعداداتك ====================
        // ⚠️ ضع التوكن الصحيح هنا
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        
        // ⚠️ سيتم الحصول على Chat ID تلقائياً
        let CHAT_ID = "i3bdullah";
        
        // ==================== عناصر الصفحة ====================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        
        let stream = null;
        
        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
            console.log(`[${type}] ${msg}`);
        }
        
        // ==================== الحصول على Chat ID تلقائياً ====================
        async function getChatId() {
            try {
                showStatus('🔍 جاري البحث عن Chat ID...', 'info');
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                console.log("رد getUpdates:", result);
                
                if (result.ok && result.result.length > 0) {
                    // الحصول على آخر تحديث
                    const lastUpdate = result.result[result.result.length - 1];
                    const chatId = lastUpdate.message?.chat?.id || 
                                   lastUpdate.callback_query?.message?.chat?.id ||
                                   lastUpdate.my_chat_member?.chat?.id;
                    
                    if (chatId) {
                        CHAT_ID = chatId;
                        showStatus(`✅ تم العثور على Chat ID: ${CHAT_ID}`, 'success');
                        return true;
                    }
                }
                
                // إذا لم يتم العثور على Chat ID
                showStatus('⚠️ لم يتم العثور على Chat ID. أرسل رسالة للبوت ثم أعد تحميل الصفحة', 'warning');
                return false;
                
            } catch (error) {
                console.error("خطأ في getUpdates:", error);
                showStatus('❌ لا يمكن الاتصال بالبوت. تأكد من صحة التوكن', 'error');
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                showStatus('📷 جاري تشغيل الكاميرا...', 'info');
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                showStatus('✅ الكاميرا جاهزة! اضغط على زر التصوير', 'success');
                captureBtn.disabled = false;
            } catch (err) {
                showStatus('❌ لا يمكن الوصول للكاميرا: ' + err.message, 'error');
                captureBtn.disabled = true;
            }
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend() {
            if (!CHAT_ID) {
                showStatus('❌ لا يوجد Chat ID. أعد تحميل الصفحة', 'error');
                return;
            }
            
            try {
                showStatus('📸 جاري التقاط الصورة...', 'info');
                captureBtn.disabled = true;
                
                // التقاط الصورة
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // تحويل إلى Blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                
                showStatus(`📤 جاري الإرسال إلى Chat ID: ${CHAT_ID}...`, 'info');
                
                // إرسال إلى تليجرام
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `📸 صورة ملتقطة في ${new Date().toLocaleString('ar-SA')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                console.log('رد تليجرام:', result);
                
                if (result.ok) {
                    showStatus('✅ تم إرسال الصورة بنجاح إلى تليجرام! 🎉', 'success');
                } else {
                    throw new Error(result.description || 'فشل الإرسال');
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                showStatus(`❌ فشل الإرسال: ${error.message}`, 'error');
                captureBtn.disabled = false;
            }
        }
        
        // ==================== تهيئة البداية ====================
        async function init() {
            // أولاً: التحقق من التوكن والحصول على Chat ID
            const hasChatId = await getChatId();
            
            if (hasChatId) {
                // ثم تشغيل الكاميرا
                await startCamera();
            } else {
                showStatus('⚠️ أرسل رسالة للبوت ثم اضغط F5 لإعادة التحميل', 'warning');
            }
        }
        
        captureBtn.onclick = captureAndSend;
        init();
        
        // إيقاف الكاميرا عند الخروج
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
