<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاميرا تليجرام</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            transform: scaleX(-1);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        canvas, #preview { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 تصوير وإرسال</h1>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <img id="preview">
        <br>
        <button id="captureBtn">📷 التقط وأرسل</button>
        <div id="status" class="status info">⏳ جاري تهيئة الكاميرا...</div>
    </div>

    <script>
        // ⚠️ أدخل بياناتك هنا
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY"
        const CHAT_ID = "i3bdullah"
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        
        let stream = null;
        
        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
        }
        
        // تشغيل الكاميرا
        async function startCamera() {
            try {
                showStatus('📷 جاري تشغيل الكاميرا...', 'info');
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                showStatus('✅ الكاميرا جاهزة، اضغط على زر التصوير', 'success');
                captureBtn.disabled = false;
            } catch (err) {
                showStatus('❌ لا يمكن الوصول للكاميرا: ' + err.message, 'error');
                captureBtn.disabled = true;
            }
        }
        
        // التقاط وإرسال الصورة
        async function captureAndSend() {
            try {
                showStatus('📸 جاري التقاط الصورة...', 'info');
                captureBtn.disabled = true;
                
                // التقاط الصورة
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // تحويل إلى Blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                
                showStatus('📤 جاري الإرسال إلى تليجرام...', 'info');
                
                // إرسال إلى تليجرام
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'photo.jpg');
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                console.log('رد تليجرام:', result);
                
                if (result.ok) {
                    showStatus('✅ تم إرسال الصورة بنجاح! 🎉', 'success');
                } else {
                    throw new Error(result.description || 'فشل الإرسال');
                }
                
            } catch (error) {
                console.error('خطأ:', error);
                showStatus(`❌ فشل الإرسال: ${error.message}`, 'error');
                captureBtn.disabled = false;
            }
        }
        
        captureBtn.onclick = captureAndSend;
        startCamera();
        
        // إيقاف الكاميرا عند الخروج
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
